<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Vebaura Technologies</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <header>
        <div class="logo-section">
            <img src="assets/images/logo_vebaura.png" class="logo" alt="Vebaura Logo">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="contact" id="contact">
        <div class="contact-logo-box">
            <img src="assets/images/logo_vebaura.png" alt="Vebaura Logo" class="contact-logo">
        </div>
        <h2>Contact Us</h2>
        <p>Reach out to start your next digital project with Vebaura Technologies.</p>
        <form class="contact-form">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" rows="6" required></textarea>
            <button class="btn-primary" type="submit">Send Message</button>
        </form>
    </section>

    <script src="js/main.js" defer></script>
</body>

</html>
